server {
    listen 80;
    server_name easyupsc.com www.easyupsc.com;

    # Redirect HTTP to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name easyupsc.com www.easyupsc.com;

    ssl_certificate /etc/letsencrypt/live/easyupsc.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/easyupsc.com/privkey.pem;

    # Serve React frontend (built files)
    root /var/www/easyupsc/client/dist;
    index index.html;

    # React Router — serve index.html for all frontend routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to Node.js backend
    location /api/ {
        proxy_pass http://localhost:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        client_max_body_size 150M;
        proxy_read_timeout 300s;
        proxy_connect_timeout 300s;
    }
}
